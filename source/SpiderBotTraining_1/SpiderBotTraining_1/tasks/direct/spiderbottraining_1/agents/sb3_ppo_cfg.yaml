seed: 42

n_timesteps: !!float 20e6
policy: 'MlpPolicy'
n_steps: 2048
batch_size: 4096
gae_lambda: 0.95
gamma: 0.99
n_epochs: 10
ent_coef: 0.03
learning_rate: !!float 3e-4
clip_range: !!float 0.2
policy_kwargs:
  activation_fn: nn.ELU
  net_arch: [256, 256]
  squash_output: False
vf_coef: 0.5
max_grad_norm: 0.5
device: "cuda:0"
normalize_input: true
clip_obs: 50.0