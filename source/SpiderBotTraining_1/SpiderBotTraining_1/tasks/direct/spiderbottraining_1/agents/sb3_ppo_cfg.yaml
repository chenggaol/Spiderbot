# Reference: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/ppo.yml#L32
seed: 42

n_timesteps: !!float 5e6
policy: 'MlpPolicy'
n_steps: 256
batch_size: 1024
gae_lambda: 0.95
gamma: 0.99
n_epochs: 20
ent_coef: 0.1 #increased this to allow robot to explore more(total_loss = policy_loss +value_loss - ent_coef*entropy)
learning_rate: !!float 3e-4
clip_range: !!float 0.2
policy_kwargs:
  activation_fn: nn.ELU
  net_arch: [256, 256]
  squash_output: False
vf_coef: 1.0
max_grad_norm: 0.5
device: "cuda:0"